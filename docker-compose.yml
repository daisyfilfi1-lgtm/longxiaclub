# ============================================================
# Docker Compose - Skills自动化服务
# ============================================================
# 功能：始终在线的Skills自动更新
#
# 使用方式：
#   docker-compose up -d        # 启动
#   docker-compose logs -f      # 查看日志
#   docker-compose restart      # 重启
#   docker-compose down         # 停止
# ============================================================

version: '3.8'

services:
  skills-auto:
    build: .
    container_name: skills-auto
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-sk-df68886ea4624f2eaa49a5519de5e501}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - SITE_URL=${SITE_URL:-https://longxiaclub.com}
      - MODE=update
    volumes:
      - ./data:/app/data
      - ./logs:/var/log
    networks:
      - skills-net

networks:
  skills-net:
    driver: bridge
