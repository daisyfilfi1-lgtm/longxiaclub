# ============================================================
# AI导航站（longxiaclub）项目级约束配置
# Nested CLAUDE.md 层 — 只对此项目生效
# ============================================================

name: "ai-nav"
description: "longxiaclub AI导航站 — Next.js 15 + Supabase + Tailwind CSS 3，AI工具聚合平台"

# --- 默认约束 ---
defaults:
  shell: "bash"
  node_version: "20"
  package_manager: "npm"

# --- 关键规则 ---
rules:
  - description: "双数据源策略：Supabase 优先，本地 data/tools.ts 回退"
    applies_to: "backend"
    content: "API 路由实现双数据源：优先 Supabase，不可用时自动回退本地 data/tools.ts。缓存 5-10 分钟。响应头 x-cache 指示缓存状态。"

  - description: "每日自动 cron (06:00 BJT)：日报→Obsidian→网站→GitHub data→发布"
    applies_to: "ops"
    content: "cron 任务 ID 9a1293a92400，每天 06:00 BJT 执行。流程：日报→Obsidian→网站更新→GitHub data 提交→发布。知乎/公众号只生成草稿。"

  - description: "ISR + SWR 双层缓存策略"
    applies_to: "frontend"
    content: "页面级 ISR（revalidate=60），API 级 withApiCache（ttl=600），客户端 SWR（自动刷新、去重）。管理后台可手动清除缓存。"

  - description: "Supabase Auth 认证方案"
    applies_to: "backend"
    content: "使用 Supabase Auth：邮箱/密码 + OAuth (GitHub, Google)。JWT Token 自动刷新。未登录用户收藏存储在 localStorage。"

  - description: "数据同步脚本优先级"
    applies_to: "data"
    content: "db:sync（增量）> db:sync:full（全量）> db:backup。添加新工具流程：data/tools.ts → db:sync → 重新部署。"

# --- Gotchas ---
gotchas:
  - description: "Supabase 连接失败时 API 静默回退到本地数据，需检查响应 source 字段"
    severity: "warning"
    detail: "API 响应包含 source 字段：supabase | local | local-fallback。如果始终是 local-fallback，检查环境变量和 Supabase 连接。"

  - description: "Next.js 15 与 @supabase/supabase-js v2.101 兼容性问题"
    severity: "warning"
    detail: "注意 @supabase/supabase-js 版本与 Next.js 15 的 SSR 兼容性。遇到 hydration mismatch 检查 supabase client 初始化。"

  - description: "Tailwind CSS 3 与 PostCSS 配置"
    severity: "info"
    detail: "项目使用 Tailwind CSS 3.4（非 v4），PostCSS 配置在 postcss.config.js。不兼容 Tailwind v4 的 @tailwindcss/postcss 插件。"

  - description: "WSL 共享盘 git 操作慢"
    severity: "warning"
    detail: "项目位于 /mnt/f/共享/AI导航/ai-nav，git 操作在共享盘较慢但可接受。如遇到问题，考虑 git clone 到 ext4。"

# --- 项目特定 skill 引用 ---
skills:
  - "ai-nav-daily-report-pipeline"
  - "ai-nav-scene-expansion"
  - "ai-nav-scene-content-upgrade"
  - "ai-nav-seo-geo-optimization"
  - "ai-nav-tools-batch-enhance"
  - "ai-nav-chaos-maturity-model"
  - "bocha-ai-search"
  - "custom-web-search-backend"
  - "post-build-verify"

# --- 禁止操作 ---
denylist:
  - description: "禁止直接修改 data/tools.ts 而不运行 db:sync（会导致数据不一致）"
    pattern: "write_file.*data/tools\\.ts"

# --- 路径约定 ---
paths:
  migrations: "supabase/migrations/"  # 如存在
  scripts: "scripts/"
  data: "data/"
  components: "components/"
