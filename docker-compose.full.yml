# ============================================================
# Docker Compose - AI导航站完整部署
# ============================================================
# 包含：前端 + 自动化服务
#
# 使用方式：
#   1. 复制 .env.example 为 .env 并填写实际值
#   2. docker-compose -f docker-compose.full.yml up -d
#   3. 访问 http://localhost:3000
# ============================================================

version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # 构建参数（从 .env 文件读取）
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost:3000}
    container_name: ai-nav-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      # 服务端环境变量（运行时）
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - REVALIDATE_TOKEN=${REVALIDATE_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - SITE_URL=${SITE_URL:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-nav-net

  # 自动化服务
  skills-auto:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-nav-auto
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - SITE_URL=${SITE_URL:-http://localhost:3000}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_KEY}
      - MODE=update
    volumes:
      - ./data:/app/data
      - ./logs:/var/log
    depends_on:
      - frontend
    networks:
      - ai-nav-net

networks:
  ai-nav-net:
    driver: bridge
