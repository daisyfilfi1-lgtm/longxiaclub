name: Deploy Frontend to Netlify

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run type check
        run: npm run type-check || true
      
      - name: Build project
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.SITE_URL || 'https://longxiaclub.com' }}
        run: npm run build
      
      # Netlify 自动部署：只需构建，Netlify 会自动检测 push 并部署
      # 前往 https://app.netlify.com → 你的站点 → Site settings → Build & deploy
      # 确保 "Build settings" 中:
      #   - Build command: npm run build
      #   - Publish directory: .next
      
      - name: Notify success
        if: success()
        run: echo "✅ Build successful! Netlify will auto-deploy."
      
      - name: Notify failure
        if: failure()
        run: echo "❌ Build failed!"
