name: Daily Leaderboard Update

# ============================================================
# 每日榜单数据自动更新
# 触发时间: 每天 06:00 UTC = 14:00 北京时间
# 包含: GitHub数据 + Product Hunt数据 + Google Trends数据
# ============================================================
on:
  schedule:
    - cron: '0 6 * * *'        # 每天 UTC 06:00
  workflow_dispatch:              # 也可手动触发 (GitHub Actions 页面 → Run workflow)
    inputs:
      dry_run:
        description: 'Dry Run (预览不写入)'
        required: false
        default: 'false'
  push:
    # data/ 目录变化时也触发 (允许外部数据源更新)
    paths:
      - 'data/**'
      - 'scripts/**'

jobs:
  update:
    name: Update Leaderboard Data
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install pytrends

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-nav/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: ai-nav

      - name: Set Environment Variables
        run: |
          echo "PH_API_KEY=${{ secrets.PH_API_KEY }}" >> $GITHUB_ENV
          echo "PH_API_SECRET=${{ secrets.PH_API_SECRET }}" >> $GITHUB_ENV

      - name: Run Product Hunt Update
        run: |
          node ai-nav/scripts/ph-client-auth.js
        working-directory: .

      - name: Run Google Trends Update
        run: |
          python ai-nav/scripts/google-trends-collector.py
        working-directory: .

      - name: Run Leaderboard Update
        id: update
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            node ai-nav/scripts/update-leaderboard.js --dry-run
          else
            node ai-nav/scripts/update-leaderboard.js
          fi
        working-directory: .

      - name: Run Comprehensive Collector
        run: |
          node ai-nav/scripts/comprehensive-collector.js
        working-directory: .

      - name: Commit and push changes
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查是否有变更
          if git diff --quiet; then
            echo "No changes to commit"
          else
            # 添加 data 目录变更
            git add data/
            
            # 生成commit message
            DATE=$(date +%Y-%m-%d)
            echo "Daily leaderboard update $DATE" > /tmp/commit_msg.txt
            echo "" >> /tmp/commit_msg.txt
            git diff --stat data/ >> /tmp/commit_msg.txt
            
            # 提交
            git commit -F /tmp/commit_msg.txt
            git push
            
            echo "Changes committed and pushed"
          fi
        working-directory: .

      - name: Trigger Netlify rebuild (optional)
        if: github.event.inputs.dry_run != 'true'
        env:
          NETLIFY_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -n "$NETLIFY_HOOK_URL" ]; then
            curl -s -X POST "$NETLIFY_HOOK_URL" > /dev/null && echo "Netlify rebuild triggered" || echo "Netlify trigger failed"
          fi

      - name: Summary
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "## Daily Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date +%Y-%m-%d) |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY