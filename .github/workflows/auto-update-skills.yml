name: Auto Update Skills

on:
  schedule:
    # 每天凌晨 2 点 UTC 运行（北京时间上午 10 点）
    # 如需北京时间凌晨 2 点，改为 '0 18 * * *'
    - cron: '0 2 * * *'
  
  # 允许手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'update'
        type: choice
        options:
          - update
          - generate
          - collect

jobs:
  update-skills:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 确保有写权限
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 如果有 requirements.txt 则安装
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run skills auto update
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://longxiaclub.com' }}
        run: |
          MODE="${{ github.event.inputs.mode || 'update' }}"
          echo "Running mode: $MODE"
          python scripts/skills-auto.py --mode $MODE
      
      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "🤖 Auto update skills - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
      
      - name: Notify success
        if: success()
        run: |
          echo "✅ Skills update completed successfully!"
          echo "Updated at: $(date)"
      
      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Skills update failed!"
          echo "Please check the logs above for details."
