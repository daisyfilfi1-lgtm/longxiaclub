name: Update Skills Data

on:
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨运行
  workflow_dispatch:  # 允许手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Collect GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/github-data-collector.js
      
      - name: Calculate heat scores
        run: node scripts/heat-calculator.js
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/github-metrics.json data/skill-heat-scores.json
          git commit -m "Update skills data" || echo "No changes to commit"
          git push
